name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release without the v prefix (e.g. 0.2.0)"
        required: true

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/macos.yml
    with:
      version: ${{ inputs.version }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: CostWidget-macos-arm64-adhoc
          path: .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          mv CostWidget-macos-arm64-adhoc.zip "CostWidget-${VERSION}-macos-arm64-adhoc.zip"
          gh release create "v${VERSION}" \
            "CostWidget-${VERSION}-macos-arm64-adhoc.zip" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "CostWidget v${VERSION}" \
            --generate-notes
