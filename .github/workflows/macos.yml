name: macOS build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request: {}
  workflow_dispatch: {}
permissions:
  contents: read

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Build unsigned arm64 app
        run: |
          xcodebuild \
            -project CostWidget.xcodeproj \
            -scheme CostWidget \
            -configuration Release \
            -sdk macosx \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=NO \
            build
          codesign --deep --force --verbose --sign - build/Build/Products/Release/CostWidget.app
          codesign --verify --deep --strict --verbose=2 build/Build/Products/Release/CostWidget.app

      - name: Package app
        run: |
          ditto -c -k --keepParent \
            build/Build/Products/Release/CostWidget.app \
            CostWidget-macos-arm64-adhoc.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: CostWidget-macos-arm64-adhoc
          path: CostWidget-macos-arm64-adhoc.zip


  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v6
        with:
          name: CostWidget-macos-arm64-adhoc
          path: .
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \\
            CostWidget-macos-arm64-adhoc.zip \\
            --repo "${GITHUB_REPOSITORY}" \\
            --title "CostWidget ${GITHUB_REF_NAME}" \\
            --generate-notes
