name: macOS build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request: {}
  workflow_dispatch: {}
permissions:
  contents: read

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Bundle ccusage for Apple Silicon
        run: |
          npm pack @ccusage/ccusage-darwin-arm64@20.0.17
          mkdir -p CostWidget/Resources/Tools
          tar -xzf ccusage-ccusage-darwin-arm64-20.0.17.tgz
          mv package/bin/ccusage CostWidget/Resources/Tools/ccusage
          chmod +x CostWidget/Resources/Tools/ccusage

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Build unsigned arm64 app
        run: |
          xcodebuild \
            -project CostWidget.xcodeproj \
            -scheme CostWidget \
            -configuration Release \
            -sdk macosx \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=NO \
            build
          mkdir -p build/Build/Products/Release/CostWidget.app/Contents/Helpers
          cp CostWidget/Resources/Tools/ccusage build/Build/Products/Release/CostWidget.app/Contents/Helpers/ccusage
          codesign --remove-signature build/Build/Products/Release/CostWidget.app/Contents/Helpers/ccusage
          codesign --force --sign - build/Build/Products/Release/CostWidget.app/Contents/Helpers/ccusage
          codesign --force --sign - --entitlements CostWidget/CostWidget.entitlements build/Build/Products/Release/CostWidget.app
          codesign --verify --deep --strict --verbose=2 build/Build/Products/Release/CostWidget.app
          codesign -d --entitlements :- build/Build/Products/Release/CostWidget.app 2>&1 | grep -q "com.apple.security.app-sandbox"
          codesign -d --entitlements :- build/Build/Products/Release/CostWidget.app/Contents/PlugIns/CostWidgetWidget.appex 2>&1 | grep -q "com.apple.security.app-sandbox"

      - name: Validate bundle metadata
        run: |
          plutil -lint build/Build/Products/Release/CostWidget.app/Contents/Info.plist
          plutil -lint build/Build/Products/Release/CostWidget.app/Contents/PlugIns/CostWidgetWidget.appex/Contents/Info.plist
          test "$(plutil -extract CFBundleIdentifier raw -o - build/Build/Products/Release/CostWidget.app/Contents/Info.plist)" = "com.moritalous.cost-widget"
          test "$(plutil -extract CFBundleExecutable raw -o - build/Build/Products/Release/CostWidget.app/Contents/PlugIns/CostWidgetWidget.appex/Contents/Info.plist)" = "CostWidgetWidget"

      - name: Validate PluginKit registration
        run: |
          /System/Library/Frameworks/CoreServices.framework/Frameworks/LaunchServices.framework/Support/lsregister -f build/Build/Products/Release/CostWidget.app
          pluginkit -a build/Build/Products/Release/CostWidget.app/Contents/PlugIns/CostWidgetWidget.appex
          pluginkit -m -A -D -i com.moritalous.cost-widget.widget | tee plugin-registration.txt
          test -s plugin-registration.txt

      - name: Package app
        run: |
          ditto -c -k --keepParent \
            build/Build/Products/Release/CostWidget.app \
            CostWidget-macos-arm64-adhoc.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: CostWidget-macos-arm64-adhoc
          path: CostWidget-macos-arm64-adhoc.zip


  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v6
        with:
          name: CostWidget-macos-arm64-adhoc
          path: .
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \\
            CostWidget-macos-arm64-adhoc.zip \\
            --repo "${GITHUB_REPOSITORY}" \\
            --title "CostWidget ${GITHUB_REF_NAME}" \\
            --generate-notes
